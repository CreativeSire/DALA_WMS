<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" fill="none">
  <rect width="1200" height="360" rx="28" fill="#091315"/>
  <rect x="36" y="70" width="250" height="200" rx="24" fill="#112024" stroke="#1F3D43"/>
  <rect x="324" y="70" width="250" height="200" rx="24" fill="#112024" stroke="#1F3D43"/>
  <rect x="612" y="70" width="250" height="200" rx="24" fill="#112024" stroke="#1F3D43"/>
  <rect x="900" y="70" width="250" height="200" rx="24" fill="#112024" stroke="#1F3D43"/>
  <text x="68" y="118" fill="#2BE3B4" font-family="Arial" font-size="16" font-weight="700">1. Protect data</text>
  <text x="68" y="154" fill="#DDE8E6" font-family="Arial" font-size="22" font-weight="700">Take database backup</text>
  <text x="68" y="190" fill="#8DA2A7" font-family="Arial" font-size="18">before risky work</text>
  <text x="356" y="118" fill="#6DC6FF" font-family="Arial" font-size="16" font-weight="700">2. Store safely</text>
  <text x="356" y="154" fill="#DDE8E6" font-family="Arial" font-size="22" font-weight="700">Save copy off-app</text>
  <text x="356" y="190" fill="#8DA2A7" font-family="Arial" font-size="18">date, owner, location</text>
  <text x="644" y="118" fill="#F5B85C" font-family="Arial" font-size="16" font-weight="700">3. Test recovery</text>
  <text x="644" y="154" fill="#DDE8E6" font-family="Arial" font-size="22" font-weight="700">Restore in safe place</text>
  <text x="644" y="190" fill="#8DA2A7" font-family="Arial" font-size="18">check that data opens</text>
  <text x="932" y="118" fill="#FF8552" font-family="Arial" font-size="16" font-weight="700">4. Resume service</text>
  <text x="932" y="154" fill="#DDE8E6" font-family="Arial" font-size="22" font-weight="700">Use runbook steps</text>
  <text x="932" y="190" fill="#8DA2A7" font-family="Arial" font-size="18">do not guess under pressure</text>
