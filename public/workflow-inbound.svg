  <text x="68" y="118" fill="#2BE3B4" font-family="Arial" font-size="16" font-weight="700">1. Truck arrives</text>
  <text x="68" y="154" fill="#DDE8E6" font-family="Arial" font-size="22" font-weight="700">Check delivery</text>
  <text x="68" y="190" fill="#8DA2A7" font-family="Arial" font-size="18">count, batch, expiry</text>
  <text x="356" y="118" fill="#6DC6FF" font-family="Arial" font-size="16" font-weight="700">2. GRN entered</text>
  <text x="356" y="154" fill="#DDE8E6" font-family="Arial" font-size="22" font-weight="700">Save into DALA</text>
  <text x="356" y="190" fill="#8DA2A7" font-family="Arial" font-size="18">partner, SKU, quantity</text>
  <text x="644" y="118" fill="#F5B85C" font-family="Arial" font-size="16" font-weight="700">3. Batch created</text>
  <text x="644" y="154" fill="#DDE8E6" font-family="Arial" font-size="22" font-weight="700">Stock becomes live</text>
  <text x="644" y="190" fill="#8DA2A7" font-family="Arial" font-size="18">ledger and alerts update</text>
  <text x="932" y="118" fill="#FF8552" font-family="Arial" font-size="16" font-weight="700">4. Risks watched</text>
  <text x="932" y="154" fill="#DDE8E6" font-family="Arial" font-size="22" font-weight="700">Expiry and reorder</text>
  <text x="932" y="190" fill="#8DA2A7" font-family="Arial" font-size="18">show up automatically</text>
